# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.
#
# Linux only, on purpose: ditto is a Debian-first tool, and macOS already ships
# its own /usr/bin/ditto, so a darwin binary or a Homebrew formula named `ditto`
# would collide with the system one on exactly the platform that would install
# it. macOS users build from source (README) and choose their own name.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ditto
    main: .
    binary: ditto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: ditto
    name_template: "ditto_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md

nfpms:
  - id: ditto
    package_name: ditto
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      Cargo-style build system for Microsoft Office and HTML deliverables.
      Author Markdown and CSV under src/, build to Word/Excel/PowerPoint and
      portable HTML under dist/, then optionally publish to a SharePoint
      library. ditto conducts the converters and reimplements nothing: it
      calls pandoc-based office-convert (md2docx/md2pptx/csv2xlsx), cleave for
      HTML, and xsync (from the xfiles suite) for the SharePoint push. Install
      whichever converters you need; ditto warns about what is missing.
    homepage: https://github.com/excelano/ditto
    license: MIT
    formats:
      - deb
    section: utils
    priority: optional
    bindir: /usr/bin
    # pandoc is the engine behind the most common target (Markdown -> Word), so
    # recommend it; xsync (packaged as xfiles in the Excelano apt repo) is only
    # needed to publish, so it is a softer suggestion. office-convert and cleave
    # are not apt packages, so they cannot be declared here — see the README.
    recommends:
      - pandoc
    suggests:
      - xfiles
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/ditto/copyright
      - src: ./README.md
        dst: /usr/share/doc/ditto/README.md
      - src: ./SECURITY.md
        dst: /usr/share/doc/ditto/SECURITY.md

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  # Ship the installers alongside the platform tarballs so a user can pin to a
  # specific release URL instead of the rolling main branch.
  extra_files:
    - glob: install.sh
    - glob: uninstall.sh

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
