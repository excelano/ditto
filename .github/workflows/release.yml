name: release

# Triggers on any tag matching v*, e.g. v0.1.0 or v1.0.0-rc1.
on:
  push:
    tags:
      - "v*"

# goreleaser writes to the GitHub release (uploads the tarballs, .debs, and
# checksums), so it needs `contents: write` on the auto-provided GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # goreleaser builds the changelog from git history, so a full clone
          # is needed rather than the default shallow one.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
